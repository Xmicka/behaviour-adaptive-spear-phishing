services:
  - type: web
    name: spear-phishing-dashboard
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install --legacy-peer-deps && npm run build && cd ..
    startCommand: gunicorn backend.api_server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: EMAIL_ENABLED
        value: "true"
      - key: RISK_THRESHOLD_EMAIL
        value: "0.5"
      - key: PLATFORM_BASE_URL
        sync: false
      - key: FIREBASE_CREDENTIALS_BASE64
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: COLLECTOR_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
